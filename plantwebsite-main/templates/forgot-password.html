<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .forgot-container {
            background-color: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            border-radius: 10px;
        }

        .forgot-container input[type="email"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .forgot-container button {
            background-color: #7a93c6;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: 1px solid #666;
            border-radius: 5px;
            cursor: pointer;
            width: 70%;
            margin-bottom: 10px;
            opacity: 1; 
        }

        .forgot-container button.disabled {
            opacity: 0.5;  
            cursor: not-allowed;
        }

        .back-button {
            background-color: #ccc;
            color: black;
            padding: 10px 20px;
            font-size: 16px;
            border: 1px solid #666;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            width: 40%;
            text-align: center;
            margin-top: 10px;
        }

        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="forgot-container">
        <h1>Forgot Password</h1>
        <form id="forgotForm" action="/forgot-password" method="POST" onsubmit="return validateEmail()">
            <input type="email" id="email" name="email" placeholder="Enter your email" required oninput="checkEmail()">
            <div id="errorMessage" class="error-message"></div>
            <button type="submit" id="submitButton">Send Reset Link</button>
        </form>
        <a href="/login" class="back-button">Back to Login</a>
    </div>

    <script>

        function checkEmail() {
            const emailInput = document.getElementById('email').value;
            const errorMessage = document.getElementById('errorMessage');
            const submitButton = document.getElementById('submitButton');

            errorMessage.textContent = "";

            if (!validateEmailFormat(emailInput)) {
                errorMessage.textContent = "Please enter a valid email address.";
                return;
            }
        }

        function validateEmailFormat(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }

        function validateEmail() {
            const emailInput = document.getElementById('email').value;
            const errorMessage = document.getElementById('errorMessage');

            if (!validateEmailFormat(emailInput) || errorMessage.textContent !== "") {
                errorMessage.textContent = "Please fix the issues before submitting.";
                return false; 
            }

            return true; 
        }
    </script>
</body>
