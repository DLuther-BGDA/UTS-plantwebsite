<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            border-radius: 10px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
            color: #666;
        }

        .container input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; 
        }

        .container button {
            background-color: #5A78C2;
            color: white;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: background-color 0.3s ease;
        }

        .container button:hover {
            background-color: #4a67a6;
        }

        .error-message {
            color: red;
            font-size: 14px;
            margin-top: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Set Your Password</h1>
        <p>Welcome, **{{ user_email }}**! Please enter the secret password to set up your account.</p>
        <form action="/create_initial_password" method="POST">
            <input type="hidden" name="user_email" value="{{ user_email }}">
            
            <input type="password" name="secret_password" placeholder="Enter Secret Password" required>
            <input type="password" name="new_password" placeholder="Create Your New Password" required>
            <input type="password" name="confirm_new_password" placeholder="Confirm New Password" required>

            {% if error_msg %}
                <div class="error-message">{{ error_msg }}</div>
            {% endif %}

            <button type="submit">Set Password</button>
        </form>
    </div>

</body>
</html>
