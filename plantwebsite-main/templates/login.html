<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page - Biogeographic Data Analysts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login_style.css') }}">
    <style>

        body {
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            font-family: Arial, sans-serif; 
        }

        .header-content {
            position: relative; 
            width: 100%; 
            padding-top: 20px; 
            box-sizing: border-box; 
            margin-bottom: 40px; 
        }

        .header-logo {
            position: absolute;
            top: 20px; 
            left: 20px; 
            width: 200px; 
            height: auto;
            z-index: 10; 
        }
        .header-logo img {
            max-width: 100%;
            height: auto;
            display: block; 
        }

        .header-text-container {
            text-align: center;
            margin-left: auto;
            margin-right: auto;
            max-width: 800px; 
        }

        .main-title {
            font-size: 3em; 
            margin-bottom: 5px;
            color: #333; 
        }
        .abn-text {
            font-size: 1.2em; 
            margin-bottom: 15px;
            color: #555;
        }
        .alpha-test-message {
            font-size: 1.2em; 
            color: #777;
            margin-top: 10px;
        }

        .login-container {

            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%; 
        }

        .login-box {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 350px; 
            text-align: center;
        }

        .login-button {
            background-color: #4CAF50 !important; 
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            text-align: center !important;
            text-decoration: none !important;
            display: inline-block !important;
            font-size: 16px !important;
            margin: 4px 2px !important;
            cursor: pointer !important;
            border-radius: 5px !important;
        }
    </style>
</head>
<body>

    <div class="header-content">
        <div class="header-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Biogeographic Data Analysts Logo">
        </div>
        <div class="header-text-container">
            <h1 class="main-title">Biogeographic Data Analysts</h1>
            <p class="abn-text">ABN 579 423 418 07</p>
            <p class="alpha-test-message">This is an alpha test site, available to approved users only</p>
        </div>
    </div>

    <div class="login-container">
        <div class="login-box">
            <p>{{ msg }}</p>
            <form id="loginForm" action="/login" method="post">
                <div class="header-text-container">
                    <p class="alpha-test-message">Native Flora and Fauna Dynamics System</p>
                </div>
                <input type="text" name="username" id="username" placeholder="username" required>
                <div class="password-container">
                    <input type="password" name="password" id="password" placeholder="password" required>
                    <span class="toggle-password" onclick="togglePassword()">VIEW</span>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <div class="links-container">
                    <a href="/forgot-password">Forgot my Password</a>
                </div>
                <button type="button" onclick="validateForm()" class="login-button">LOGIN</button>
                <button type="button" onclick="window.location.href='/signup'" class="register-button">REGISTER NEW ACCOUNT</button>
            </form>
        </div>
    </div>

    <script>

        function togglePassword() {
            var passwordField = document.getElementById("password");
            var toggleText = document.querySelector(".toggle-password");
            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleText.textContent = "HIDE";
            } else {
                passwordField.type = "password";
                toggleText.textContent = "VIEW";
            }
        }

        function validateForm() {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            var errorMessage = document.getElementById("errorMessage");

            errorMessage.textContent = "";

            if (username === "" || password === "") {
                errorMessage.textContent = "Both fields are required!";
                return false;
            }

            document.getElementById("loginForm").submit();
        }
    </script>
</body>
</html>
